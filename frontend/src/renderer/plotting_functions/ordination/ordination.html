<!-- ordination.html -->
<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMS Ordination Plot</title>
    <link rel="stylesheet" href="../../shared/styles/index.css">
</head>
<body>
    <h1>Ordination Plot Generator</h1>
<button id="home-btn">Return Home</button>

    <!-- separate form for .RData file upload that will be ignored by the R script -->
    <form id="rdata-file-form">
        <label for="rdata-file">Upload .RData File:</label>
        <input type="file" id="rdata-file" name="rdata-file" accept=".RData, .rda">
        <label for="ExpObj">Choose Summarized Experiment Object:</label>
        <select id="ExpObj" name="ExpObj"></select>
      </form>




      <!-- Normal form for all other parameters -->
      <form id="ordination-script-form">
        <label for="glomby">glomby:</label>
        <input type="text" id="glomby" name="glomby"><br>

        <label for="algorithm">Algorithm</label>
        <input type="text" id="algorithm" name="algorithm"><br>

        <label for="PCA_Components">PCA_Components</label>
        <input type="text" id="PCA_Components" name="PCA_Components"><br>

        <label for="distmethod">Distance Method</label>
        <input type="text" id="distmethod" name="distmethod"><br>

        <label for="subsetby">Subset by:</label>
        <input type="text" id="subsetby" name="subsetby"><br>

        <label for="compareby">Compare by:</label>
        <input type="text" id="compareby" name="compareby"><br>

        <label for="colourby">Colour By</label>
        <input type="text" id="colourby" name="colourby"><br>

        <label for="colorby">Color By</label>
        <input type="text" id="colorby" name="colorby"><br>

        <label for="shapeby">Shape By</label>
        <input type="text" id="shapeby" name="shapeby"><br>

        <label for="samplesToKeep">Samples To Keep:</label>
        <input type="text" id="samplesToKeep" name="samplesToKeep"><br>

        <label for="samplesToHighlight">Samples to Highlight</label>
        <input type="text" id="samplesToHighlight" name="samplesToHighlight"><br>

        <label for="featuresToKeep">Features to Keep:</label>
        <input type="text" id="featuresToKeep" name="featuresToKeep"><br>

        <label for="ignoreunclassified">Ignore Unclassified</label>
        <input type="checkbox" id="ignoreunclassified" name="ignoreunclassified" value="true" checked><br>

        <label for="applyfilters">Apply Filters:</label>
        <select name="applyfilters" id="applyfilters">
            <option value="none">none</option>
            <option value="light">light</option>
            <option value="moderate">moderate</option>
            <option value="stringent">stringent</option>
        </select><br>

        <label for="featcutoff">Feature cutoff:</label>
        <input type="text" id="featcutoff" name="featcutoff"><br>

        <label for="GenomeCompletenessCutoff">Genome Completeness Cutoff:</label>
        <input type="text" id="GenomeCompletenessCutoff" name="GenomeCompletenessCutoff"><br>

        <label for="discard_SDoverMean_below">discard_SDoverMean_below</label>
        <input type="text" id="discard_SDoverMean_below" name="discard_SDoverMean_below"><br>

        <label for="asPPM">As Parts Per Million</label>
        <input type="checkbox" id="asPPM" name="asPPM" value="true" checked><br>

        <label for="normalization">Normalization</label>
        <select name="normalization" id="normalization">
            <option value="relabund">relabund</option>
            <option value="compositions">compositions</option>
        </select><br>

        <label for="PPM_normalize_to_bases_sequenced">PPM_normalize_to_bases_sequenced</label>
        <input type="checkbox" id="PPM_normalize_to_bases_sequenced" name="PPM_normalize_to_bases_sequenced"><br>

        <label for="assay_for_matrix">Assay for Matrix</label>
        <select name="assay_for_matrix" id="assay_for_matrix">
          <option value="BaseCounts">BaseCounts</option>
          <option value="GeneCounts">GeneCounts</option>
        </select><br>

        <label for="use_letters_as_shapes">Use Letters as Shapes?</label>
        <input type="checkbox" id="use_letters_as_shapes" name="use_letters_as_shapes"><br>
    
        <label for="sizeby">Size By</label>
        <input type="text" id="sizeby" name="sizeby"><br>

        <label for="connectby">Connect By</label>
        <input type="text" id="connectby" name="connectby"><br>

        <label for="connection_orderby">Connection Order By</label>
        <input type="text" id="connection_orderby" name="connection_orderby"><br>

        <label for="textby">Text By:</label>
        <input type="text" id="textby" name="textby"><br>

        <label for="ellipseby">Ellipse By</label>
        <input type="text" id="ellipseby" name="ellipseby"><br>

        <label for="dotsize">Dot Size</label>
        <input type="number" id="dotsize" name="dotsize"><br>

        <label for="log2tran">log2tran</label>
        <input type="checkbox" id="log2tran" name="log2tran"><br>

        <label for="tsne_perplx">Tsne_perplx</label>
        <input type="text" id="tsne_perplx" name="tsne_perplx"><br>

        <label for="max_neighbors">Maximum Neighbors</label>
        <input type="number" id="max_neighbors" name="max_neighbors"><br>

        <label for="permanova">Permanova</label>
        <input type="checkbox" id="permanova" name="permanova"><br>

        <label for="plotcentroids">Plot Centroids</label>
        <input type="checkbox" id="plotcentroids" name="plotcentroids"><br>

        <label for="highlight_centroids">Highlight Centroids</label>
        <input type="checkbox" id="highlight_centroids" name="highlight_centroids"><br>

        <label for="show_centroid_distances">show_centroid_distances</label>
        <input type="checkbox" id="show_centroid_distances" name="show_centroid_distances"><br>

        <label for="calculate_centroid_distances_in_all_dimensions">calculate_centroid_distances_in_all_dimensions</label>
        <input type="checkbox" id="calculate_centroid_distances_in_all_dimensions" name="calculate_centroid_distances_in_all_dimensions"><br>

        <label for="addtit">Add Title:</label>
        <input type="text" id="addtit" name="addtit"><br>

        <label for="cdict">Colour Dictionary</label>
        <input type="text" id="cdict" name="cdict"><br>

        <label for="grid">Grid?</label>
        <input type="checkbox" id="grid" name="grid"><br>

        <label for="forceaspectratio">Force Aspect Ratio</label>
        <input type="number" id="forceaspectratio" name="forceaspectratio" value="1"><br>

        <label for="numthreads">Number of Threads Used</label>
        <input type="number" id="numthreads" name="numthreads" value="1"><br>

        <label for="return_coordinates_matrix">Return Coordinates Matrix?</label>
        <input type="checkbox" id="return_coordinates_matrix" name="return_coordinates_matrix"><br>

        <label for="permanova_permutations">permanova_permutations</label>
        <input type="number" id="permanova_permutations" name="permanova_permutations" value="10000"><br>

        <label for="include_components_variance_plot">include_components_variance_plot</label>
        <input type="checkbox" id="include_components_variance_plot" name="include_components_variance_plot"><br>

        <label for="class_to_ignore">Class to Ignore? (Default is N_A)</label>
        <input type="text" id="class_to_ignore" name="class_to_ignore" value="N_A"><br>


        <button type="submit">Run Ordination Plot</button><br>
      </form>
    <script src="ordination.js"></script>
</body>
</html>
