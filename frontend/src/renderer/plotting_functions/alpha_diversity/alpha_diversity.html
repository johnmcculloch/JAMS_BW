<!-- alpha_diversity.html -->
<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link rel="stylesheet" href="../shared/styles/index.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>
    <h1>Alpha Diversity Plot Generator</h1>
    <button id="home-btn">Return Home</button>

    <!-- Separate form for .RData file upload that will be ignored by the R script -->
    <form id="rdata-file-form">
        <label for="rdata-file">Upload .RData File:</label>
        <input type="file" id="rdata-file" name="rdata-file" accept=".RData, .rda">

        <label for="ExpObj">Choose Sumarized Experiment Object:</label>
        <select id="ExpObj" name="ExpObj"></select>
    </form>

    <!-- Form for user parameters-->
    <form id="alpha_diversity-script-form">
        <label for="measures">Measures</label>
        <input type="text" id="measures" name="measures" value="c('Observed', 'Chao1', 'Shannon', 'Simpson', 'InvSimpson', 'GeneCount')"><br>

        <label for="stratify_by_kingdoms">Stratify By Kingdoms</label>
        <input type="checkbox" id="stratify_by_kingdoms" name="stratify_by_kingdoms" value="TRUE"><br>
    
        <label for="glomby">glomby:</label>
        <input type="text" id="glomby" name="glomby"><br>

        <label for="samplesToKeep">Samples To Keep:</label>
        <input type="text" id="samplesToKeep" name="samplesToKeep"><br>

        <label for="featuresToKeep">Features to Keep:</label>
        <input type="text" id="featuresToKeep" name="featuresToKeep"><br>

        <label for="subsetby">Subset by:</label>
        <input type="text" id="subsetby" name="subsetby"><br>

        <label for="compareby">Compare by:</label>
        <input type="text" id="compareby" name="compareby"><br>

        <label for="compareby_order">Compare by Order:</label>
        <input type="text" id="compareby_order" name="compareby_order"><br>

        <label for="colourby">Colour By</label>
        <input type="text" id="colourby" name="colourby"><br>

        <label for="shapeby">Shape By</label>
        <input type="text" id="shapeby" name="shapeby"><br>

        <label for="fillby">fillby</label>
        <input type="text" id="fillby" name="fillby"><br>

        <label for="pairby">Pair By</label>
        <input type="text" id="pairby" name="pairby"><br>

        <label for="connectby">Connect By</label>
        <input type="text" id="connectby" name="connectby"><br>

        <label for="facetby">Facet By:</label>
        <input type="text" id="facetby" name="facetby"><br>

        <label for="wrap_facet">wrap_facet</label>
        <input type="text" id="wrap_facet" name="wrap_facet"><br>

        <label for="overlay_boxplot">overlay_boxplot</label>
        <input type="checkbox" id="overlay_boxplot" name="overlay_boxplot"><br>

        <label for="applyfilters">Apply Filters:</label>
        <select name="applyfilters" id="applyfilters">
            <option value="none">none</option>
            <option value="light">light</option>
            <option value="moderate">moderate</option>
            <option value="stringent">stringent</option>
        </select><br>


        <label for="featcutoff">Feature cutoff:</label>
        <input type="text" id="featcutoff" name="featcutoff"><br>

        <label for="GenomeCompletenessCutoff">Genome Completeness Cutoff:</label>
        <input type="text" id="GenomeCompletenessCutoff" name="GenomeCompletenessCutoff"><br>

        <label for="PPM_normalize_to_bases_sequenced">PPM_normalize_to_bases_sequenced</label>
        <input type="checkbox" id="PPM_normalize_to_bases_sequenced" name="PPM_normalize_to_bases_sequenced"><br>

        <label for="addtit">Add Title:</label>
        <input type="text" id="addtit" name="addtit"><br>

        <label for="signiflabel">signiflabel</label>
        <input type="text" id="signiflabel" name="signiflabel" value="p.format"><br>

        <label for="max_pairwise_cats">Max Pairwise Categories</label>
        <input type="number" id="max_pairwise_cats" name="max_pairwise_cats" value="4"><br>

        <label for="ignoreunclassified">Ignore Unclassified</label>
        <input type="checkbox" id="ignoreunclassified" name="ignoreunclassified" value="true" checked><br>

        <label for="class_to_ignore">Class to Ignore? (Default is N_A)</label>
        <input type="text" id="class_to_ignore" name="class_to_ignore" value="N_A"><br>

    </form>



    <script src="alpha_diversity.js"></script>
</body>
</html>
