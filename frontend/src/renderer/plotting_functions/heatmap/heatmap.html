<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMS</title>
  <link rel="stylesheet" href="../../shared/styles/index.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <style>
    #advanced-settings {
      display: none;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>JAMS Heatmap Generator</h1>
<button id="home-btn">Return Home</button>

  <!-- Separate form for .RData file upload that will be ignored by the R script -->
  <form id="rdata-file-form">
    <label for="rdata-file">Upload .RData File:</label>
    <input type="file" id="rdata-file" name="rdata-file" accept=".RData, .rda">
    <label for="ExpObj">Choose Summarized Experiment Object:</label>
    <select id="ExpObj" name="ExpObj"></select>
  </form>

  <!-- Normal form for all other paramters-->
  <form id="heatmap-script-form">

    <label for="glomby">glomby:</label>
    <input type="text" id="glomby" name="glomby"><br>

    <label for="hmtype">Heatmap type:</label>
    <select name="hmtype" id="hmtype">
      <option value="exploratory">exploratory</option>
      <option value="comparative">comparative</option>
    </select>

    <label for="samplesToKeep">Samples To Keep:</label>
    <input type="text" id="samplesToKeep" name="samplesToKeep"><br>

    <label for="featuresToKeep">Features to Keep:</label>
    <input type="text" id="featuresToKeep" name="featuresToKeep"><br>

    <label for="applyfilters">Apply Filters:</label>
    <select name="applyfilters" id="applyfilters">
      <option value="none">none</option>
      <option value="light">light</option>
      <option value="moderate">moderate</option>
      <option value="stringent">stringent</option>
    </select><br>

    <label for="featcutoff">Feature cutoff:</label>
    <input type="text" id="featcutoff" name="featcutoff"><br>

    <label for="GenomeCompletenessCutoff">Genome Completeness Cutoff:</label>
    <input type="text" id="GenomeCompletenessCutoff" name="GenomeCompletenessCutoff"><br>

    <label for="PPM_normalize_to_bases_sequenced">PPM_normalize_to_bases_sequenced</label>
    <input type="checkbox" id="PPM_normalize_to_bases_sequenced" name="PPM_normalize_to_bases_sequenced"><br>

    <label for="subsetby">Subset by:</label>
    <input type="text" id="subsetby" name="subsetby"><br>

    <label for="compareby">Compare by:</label>
    <input type="text" id="compareby" name="compareby"><br>

    <label for="invertbinaryorder">Invert Binary Order:</label>
    <input type="checkbox" id="invertbinaryorder" name="invertbinaryorder"><br>

    <label for="showonlypbelow">Show Only p value below:</label>
    <input type="text" id="showonlypbelow" name="showonlypbelow"><br>

    <label for="adj_pval_for_threshold"> Adjusted p-value for Threshold</label>
    <input type="checkbox" id="adj_pval_for_threshold" name="adj_pval_for_threshold"><br>

    <label for="ntop">ntop:</label>
    <input type="text" id="ntop" name="ntop"><br>

    <label for="colcategories">Column Categories:</label>
    <input type="text" id="colcategories" name="colcategories"><br>

    <label for="splitcolsby">Split Columns By:</label>
    <input type="text" id="splitcolsby" name="splitcolsby"><br>

    <label for="ordercolsby">Order Columns By:</label>
    <input type="text" id="ordercolsby" name="ordercolsby"><br>

    <label for="textby">Text By:</label>
    <input type="text" id="textby" name="textby"><br>

    <label for="cluster_samples_per_heatmap">Cluster Samples Per Heatmap:</label>
    <input type="checkbox" id="cluster_samples_per_heatmap" name="cluster_samples_per_heatmap"><br>

    <label for="cluster_features_per_heatmap">Cluster Features Per Heatmap:</label>
    <input type="checkbox" id="cluster_features_per_heatmap" name="cluster_features_per_heatmap"><br>

    <label for="label_samples">Label Samples:</label>
    <input type="checkbox" id="label_samples" name="label_samples"><br>

    <label for="cluster_rows">Cluster Rows:</label>
    <input type="checkbox" id="cluster_rows" name="cluster_rows"><br>

    <label for="max_rows_in_heatmap">Maximum Rows in Heatmap:</label>
    <input type="number" id="max_rows_in_heatmap" name="max_rows_in_heatmap"><br>

    <label for="no_underscores">No Underscores:</label>
    <input type="checkbox" id="no_underscores" name="no_underscores"><br>

    <label for="showGram">showGram:</label>
    <input type="checkbox" id="showGram" name="showGram"><br>

    <label for="show_GenomeCompleteness">Show Genome Completeness:</label>
    <input type="checkbox" id="show_GenomeCompleteness" name="show_GenomeCompleteness"><br>

    <label for="addtit">Add Title:</label>
    <input type="text" id="addtit" name="addtit"><br>

    <!-- toggle switch for advanced settings -->
     <label for="toggle-advanced-settings">
        <input type="checkbox" id="toggle-advanced-settings" name="advancedSettings">
        Show Advanced Settings
     </label>

     <!-- Advanced settings section -->
     <div id="advanced-settings">
      <label for="hmasPA">hmasPA</label>
      <input type="checkbox" id="hmasPA" name="hmasPA"><br>

      <label for="threshPA">threshPA</label>
      <input type="number" id="threshPA" name="threshPA" value="0"><br>

      <label for="cluster_column_slices">Cluster Column Slices</label>
      <input type="checkbox" id="cluster_column_slices" name="cluster_column_slices" value="true" checked><br>

      <label for="column_split_group_order">column_split_group_order</label>
      <input type="text" id="column_split_group_order" name="column_split_group_order"><br>

      <label for="row_order">Row Order</label>
      <input type="text" id="row_order" name="row_order"><br>

      <label for="discard_SDoverMean_below">discard_SDoverMean_below</label>
      <input type="text" id="discard_SDoverMean_below" name="discard_SDoverMean_below"><br>

      <label for="maxl2fc">Maximum Log 2-Fold Change</label>
      <input type="text" id="maxl2fc" name="maxl2fc"><br>

      <label for="minl2fc">Minimum Log 2-Fold Change</label>
      <input type="text" id="minl2fc" name="minl2fc"><br>

      <label for="fun_for_l2fc">fun_for_l2fc</label>
      <input type="text" id="fun_for_l2fc" name="fun_for_l2fc" value="geom_mean"><br>

      <label for="showpval">Show p-value</label>
      <input type="checkbox" id="showpval" name="showpval" value="true" checked><br>

      <label for="showroundedpval">Show Rounded p-value</label>
      <input type="checkbox" id="showroundedpval" name="showroundedpval" value="true" checked><br>

      <label for="showl2fc">Show Log 2-Fold Change</label>
      <input type="checkbox" id="showl2fc" name="showl2fc" value="true" checked><br>

      <label for="assay_for_matrix">Assay for Matrix</label>
      <select name="assay_for_matrix" id="assay_for_matrix">
        <option value="BaseCounts">BaseCounts</option>
        <option value="GeneCounts">GeneCounts</option>
      </select><br>

      <label for="normalization">Normalization</label>
      <select name="normalization" id="normalization">
        <option value="relabund">relabund</option>
        <option value="compositions">compositions</option>
      </select><br>

      <label for="asPPM">As Parts Per Million</label>
      <input type="checkbox" id="asPPM" name="asPPM" value="true" checked><br>

      <label for="scaled">Scaled</label>
      <input type="checkbox" id="scaled" name="scaled"><br>

      <label for="cdict">Colour Dictionary</label>
      <input type="text" id="cdict" name="cdict"><br>

      <label for="maxnumheatmaps">Maximum Number of Heatmaps</label>
      <input type="text" id="maxnumheatmaps" name="maxnumheatmaps"><br>

      <label for="numthreads">Number of Threads Used</label>
      <input type="number" id="numthreads" name="numthreads" value="1"><br>

      <label for="statsonlog">statsonlog</label>
      <input type="checkbox" id="statsonlog" name="statsonlog"><br>

      <label for="ignoreunclassified">Ignore Unclassified</label>
      <input type="checkbox" id="ignoreunclassified" name="ignoreunclassified" value="true" checked><br>

      <label for="returnstats"> Return Stats</label>
      <input type="checkbox" id="returnstats" name="returnstats"><br>

      <label for="class_to_ignore">Class to Ignore? (Default is N_A)</label>
      <input type="text" id="class_to_ignore" name="class_to_ignore" value="N_A"><br>

     </div>



  
    <button type="submit">Run Heatmap</button><br>
  </form>

  <h2>Output</h2>
  <div id="param-str-output"></div><br>
  <div id="output"></div><br>
  <p id="pdf-path"></p>
  <button id="openFileLocation">Open PDF</button>
  <div id="pdf-container"></div>
  <img id="heatmap-image" src="" alt="Generated Heatmap" />
  <script src="heatmap.js"></script>
  <script>
    document.getElementById('toggle-advanced-settings').addEventListener('change', function() {
      const advancedSettings = document.getElementById('advanced-settings');
      if(this.checked) {
        advancedSettings.style.display = 'block';
      } else {
        advancedSettings.style.display = 'none';
      }
    });
  </script>
</body>
</html>
